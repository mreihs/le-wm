defaults:
  - _self_
  - data: pusht

output_model_name: lewm
subdir: ${hydra:job.id}

num_workers: 6
train_split: 0.9
seed: 3072
img_size: 224
patch_size: 14
encoder_scale: base
dump_object: True

trainer:
  max_epochs: 100
  devices: auto
  accelerator: gpu
  precision: bf16
  gradient_clip_val: 1.0

loader:
  batch_size: 128
  num_workers: ${num_workers}
  persistent_workers: True
  prefetch_factor: 3
  pin_memory: True

augmentation:
  enabled: false
  brightness:
    p: 0.7
    max_delta: 0.18
  contrast:
    p: 0.6
    max_delta: 0.18
  saturation:
    p: 0.5
    max_delta: 0.15
  gamma:
    p: 0.35
    min: 0.85
    max: 1.2
  noise:
    p: 0.35
    std_min: 0.0
    std_max: 0.025
  blur:
    p: 0.12
    kernel_size: 3
  compression:
    p: 0.2
    levels_min: 48
    levels_max: 96
  cutout:
    p: 0.1
    size_frac: 0.08
    fill: 0.0

optimizer:
  type: AdamW
  lr: 5e-5
  weight_decay: 1e-3

wandb:
  enabled: True
  config:
    entity: lewm
    project: lewm
    name: ${output_model_name}
    id: ${subdir}
    resume: allow
    log_model: False

wm:
  type: lewm
  history_size: 3
  num_preds: 1
  embed_dim: 192

predictor:
  depth: 6
  heads: 16
  mlp_dim: 2048
  dim_head: 64
  dropout: 0.1
  emb_dropout: 0.0

loss:
  sigreg:
    weight: 0.09
    kwargs:
      knots: 17
      num_proj: 1024
